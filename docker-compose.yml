services:
  # 1. Container Cơ sở dữ liệu (SQL Server)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tunevault-db
    restart: always
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Aa123456
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Aa123456", "-Q", "SELECT 1", "-No"]
      timeout: 5s
      retries: 10
      interval: 5s

  # 1.5. Container chạy script khởi tạo CSDL
  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: tunevault-db-init
    depends_on:
      db:
        condition: service_healthy
    command: >
      /bin/bash -c "
        echo 'Waiting for SQL Server to be ready...';
        sleep 5;
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'Aa123456' -d master -i /scripts/init.sql;
        echo 'Database initialized successfully!';
      "
    volumes:
      - ./init.sql:/scripts/init.sql

  # 2. Container Backend
  backend:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: tunevault-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=master;User Id=sa;Password=Aa123456;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  # 3. Container Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: tunevault-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: tunevault-adminer
    ports:
      - "8088:8080"
    depends_on:
      - db
    networks:
      - default

volumes:
  mssql_data:
    driver: local
